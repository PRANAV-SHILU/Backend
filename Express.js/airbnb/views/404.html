<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | Airbnb</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--bg-color);
        padding: 20px;
      }

      .not-found-card {
        text-align: center;
        max-width: 520px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-lg);
        padding: 60px 50px;
        box-shadow: var(--shadow-lg);
        animation: fadeUp 0.5s cubic-bezier(0.25, 0.8, 0.25, 1) both;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(24px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .not-found-code {
        font-size: 7rem;
        font-weight: 700;
        line-height: 1;
        background: linear-gradient(135deg, var(--primary) 0%, #ff8c69 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 10px;
        letter-spacing: -4px;
        animation: pulse 3s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.75; }
      }

      .not-found-icon {
        font-size: 3rem;
        margin-bottom: 20px;
        display: block;
      }

      .not-found-title {
        font-size: 1.6rem;
        font-weight: 600;
        color: var(--text-main);
        margin-bottom: 12px;
      }

      .not-found-desc {
        font-size: 1rem;
        color: var(--text-muted);
        margin-bottom: 40px;
        line-height: 1.6;
      }

      .not-found-actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="not-found-card">
      <span class="not-found-icon">🏠</span>
      <div class="not-found-code">404</div>
      <h1 class="not-found-title">Page not found</h1>
      <p class="not-found-desc">
        Looks like this listing has gone on a long vacation.<br>
        The page you're looking for doesn't exist or has been moved.
      </p>
      <div class="not-found-actions">
        <a href="/" class="btn btn-primary">Back to Home</a>
        <a href="javascript:history.back()" class="btn btn-outline">Go Back</a>
      </div>
    </div>
  </body>
</html>
